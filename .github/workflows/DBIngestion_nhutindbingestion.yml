name: Deploy DB Ingestion Service

on:
  push:
    branches:
      - DBIngestion
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: "nhutindbingestion"
  AZURE_FUNCTIONAPP_PACKAGE_PATH: "."
  PYTHON_VERSION: "3.11"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🧪 Install dependencies
        run: |
          echo "🔍 Python version:"
          python --version
          echo "📦 Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "📦 Installing into .python_packages..."
          mkdir -p .python_packages/lib/site-packages
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          echo "✅ Dependencies installed"

      - name: 🔐 Login to Azure with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_NHUTIN_GH_DEPLOYER_CLIENT_ID }} # nhutin-managed-identity Client ID
          tenant-id: ${{ secrets.AZURE_NHUTIN_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🧾 Show current Azure account
        run: |
          echo "🔑 Verifying Azure identity..."
          az account show --output table

      - name: 🚀 Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: ✅ Done
        run: echo "🎉 Deployed HOZ Parquet Function App!"
